# =============================================================================
# vibemix — Release Matrix Driver (Phase 18 Plan 18-05)
# =============================================================================
#
# Triggers:
#   - `push` of a tag matching `v*` (production release)
#   - `workflow_dispatch` (manual rehearsal; pass `dry_run: true` to skip
#     publish stages even when secrets are available)
#
# Matrix:
#   - macos-14 (Apple Silicon — minimum target per Phase 18 CONTEXT §Area 2)
#   - windows-latest (per Phase 18 CONTEXT §Area 3)
#
# Per-OS stages (5):
#   1. BUILD    — `scripts/build_sidecar.py --spec vibemix-core.<os>.spec`
#                 then `cargo tauri build` against the Tauri wrapper.
#   2. SIGN     — macOS: `scripts/dist/sign_macos.sh` (Plan 18-02 chain:
#                 codesign + create-dmg + notarytool + stapler)
#                 Windows: `signpath/github-action-submit-signing-request@v1.2.0`
#                 (Plan 18-03 SignPath OSS flow).
#   3. PACKAGE  — macOS: DMG produced by sign_macos.sh stage 4.
#                 Windows: `iscc installer/windows/vibemix-installer.iss`
#                 (Plan 18-03 Inno Setup 6 → vibemix-installer.msi).
#   4. VERIFY   — `python -m scripts.dist.verify_binary <bundle>` (Plan 18-01
#                 AIza-pattern leak gate). ALWAYS runs, even in mock-signing
#                 fallback — protects against leaked keys reaching unsigned
#                 PR artifacts.
#   5. PUBLISH  — `softprops/action-gh-release@v2` uploads DMG/MSI/manifest
#                 to GitHub Releases (draft mode); curl POSTs signed
#                 `latest.json` to api.altidus.world (Plan 18-04 contract).
#
# Cross-plan integration:
#   Plan 18-01 → verify stage (`scripts/dist/verify_binary.py`)
#   Plan 18-02 → macOS sign stage (`scripts/dist/sign_macos.sh`)
#   Plan 18-03 → Windows package stage (`installer/windows/vibemix-installer.iss`)
#   Plan 18-04 → publish stage (`scripts/dist/sign_manifest.sh`,
#                placeholder-pubkey-gate against `tauri/src-tauri/tauri.conf.json5`)
#
# Mock-signing fallback (T-18-18 mitigation, see threat model):
#   When ANY of APPLE_DEVELOPER_ID_P12_BASE64 / SIGNPATH_API_TOKEN /
#   TAURI_UPDATER_PRIVATE_KEY are absent (fork PRs, dry-runs, or before
#   Kaan configures the secrets), the workflow runs BUILD → VERIFY only.
#   Sign + package + publish stages are skipped. The verify stage still
#   runs on the UNSIGNED bundle so leak detection never goes offline.
#
# Secret discipline:
#   - All 14 secrets referenced as `${{ secrets.XXX }}`; ZERO values inline.
#   - `set +x` applied before every block that exports a secret env var.
#   - GitHub Actions auto-masks the values it reads from `secrets` context.
#   - Inventory + provenance in `.github/workflows/README.md`.
#
# Runbook: `docs/release-process.md`
# =============================================================================

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build + verify only; skip sign/package/publish even if secrets are present"
        type: boolean
        default: true

permissions:
  contents: write   # Required for softprops/action-gh-release to create the release
  id-token: write   # Reserved — OIDC adoption is a Phase 20 follow-up

env:
  CARGO_TERM_COLOR: always
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  # ---------------------------------------------------------------------------
  # Wave 0 — Pre-flight gates.
  # ---------------------------------------------------------------------------

  # Phase 38 — Mirror of verify-signed.yml::audit-no-apple-signpath-post.
  # Fires on tag-push directly so a forbidden POST/PUT to apple/signpath/
  # notarytool fails the release pipeline BEFORE any signing step runs.
  # Pitfall P46 hard rule.
  p46-audit:
    name: Audit — no Apple/SignPath POST/PUT (P46)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Grep for forbidden POST/PUT to Apple/SignPath/notarytool
        run: |
          set -euo pipefail
          if grep -RIn --include='*.yml' --include='*.yaml' \
            -E '(curl|wget|Invoke-WebRequest|Invoke-RestMethod).*(POST|PUT).*(apple\.com|signpath\.io|notarytool)' \
            .github/workflows \
            | grep -vE '^[^:]+:[0-9]+:[[:space:]]*#'; then
            echo "::error::Forbidden POST/PUT to Apple/SignPath endpoints (P46)"
            exit 1
          fi
          if grep -RIn --include='*.py' --include='*.sh' \
            -E '(POST|PUT).*(apple\.com|signpath\.io|notarytool)' \
            scripts/ 2>/dev/null \
            | grep -vE '^[^:]+:[0-9]+:[[:space:]]*#'; then
            echo "::error::Forbidden POST/PUT to Apple/SignPath endpoints (P46) in scripts"
            exit 1
          fi
          if grep -RIn --include='*.ps1' \
            -E '(Invoke-WebRequest|Invoke-RestMethod|System\.Net\.WebClient|System\.Net\.Http).*(apple\.com|signpath\.io|notarytool)' \
            scripts/ 2>/dev/null \
            | grep -vE '^[^:]+:[0-9]+:[[:space:]]*#'; then
            echo "::error::Forbidden PowerShell HTTP verb to Apple/SignPath/notarytool (P46)"
            exit 1
          fi
          echo "::notice::P46 audit clean — no forbidden POST/PUT references."

  detect-signing-mode:
    name: Detect signing mode
    runs-on: ubuntu-latest
    outputs:
      signing_available: ${{ steps.check.outputs.signing_available }}
    steps:
      - id: check
        env:
          # NOTE: secrets accessed here ONLY to test for presence; values are
          # never echoed or persisted. GitHub masks them in any incidental
          # log emission. `set +x` is applied before the conditional read.
          HAS_APPLE: ${{ secrets.APPLE_DEVELOPER_ID_P12_BASE64 != '' }}
          HAS_SIGNPATH: ${{ secrets.SIGNPATH_API_TOKEN != '' }}
          HAS_TAURI_KEY: ${{ secrets.TAURI_UPDATER_PRIVATE_KEY != '' }}
        run: |
          set +x   # defensive — never echo secret-presence boolean composition
          if [[ "$HAS_APPLE" == "true" && "$HAS_SIGNPATH" == "true" && "$HAS_TAURI_KEY" == "true" ]]; then
            echo "signing_available=true" >> "$GITHUB_OUTPUT"
            echo "Signing secrets present — full release mode."
          else
            echo "signing_available=false" >> "$GITHUB_OUTPUT"
            echo "Signing secrets absent — mock-signing dry-run mode."
          fi

  secret-name-audit:
    name: Audit Tauri updater secret-name alignment
    runs-on: ubuntu-latest
    # Pitfall 7 prevention: Tauri docs alternate between TAURI_UPDATER_KEY_PASSWORD
    # and TAURI_UPDATER_PRIVATE_KEY_PASSWORD; drift between the 3 files (release.yml,
    # tauri.conf.json5, sign_manifest.sh) causes a SILENT updater-signature failure
    # (latest.json signed with wrong env var → updater rejects). Per
    # tauri/src-tauri/keys/README.md the canonical name is TAURI_UPDATER_KEY_PASSWORD;
    # the audit fires on tag pushes + workflow_dispatch rehearsals.
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Assert single canonical password env var name
        # Matches ACTUAL env-var usage patterns (env: KEY:, ${{ secrets.KEY }},
        # $KEY, ${KEY}, "${KEY:-...}", : "${KEY:?...}") rather than bare substring;
        # this keeps the audit's own assertion strings from self-matching. Per
        # planner-antipatterns.md grep-gate hygiene, # and // comments stripped.
        run: |
          set -e
          FAIL=0
          # Usage-pattern regex (extended): preceded by env-context, $, ${, "${,
          # or followed by colon-assign, equals, or close-paren in secrets context.
          USAGE_RE='(\$\{?|secrets\.|env:[[:space:]]+|: ?"?\$\{|^[[:space:]]*[A-Z_]*=)'
          for f in .github/workflows/release.yml tauri/src-tauri/tauri.conf.json5 scripts/dist/sign_manifest.sh; do
            if [[ ! -f "$f" ]]; then
              echo "::error::Audit file missing: $f"
              FAIL=1
              continue
            fi
            BODY=$(grep -v '^[[:space:]]*#' "$f" | grep -v '^[[:space:]]*//' || true)
            # Forbidden = the Tauri docs alternate name. Match only when in usage position.
            FORBIDDEN_HITS=$(printf '%s\n' "$BODY" | grep -E "${USAGE_RE}TAURI_UPDATER_PRIVATE_KEY_PASSWORD" -c || true)
            CANONICAL_HITS=$(printf '%s\n' "$BODY" | grep -E "${USAGE_RE}TAURI_UPDATER_KEY_PASSWORD" -c || true)
            echo "  $f → forbidden_usages=$FORBIDDEN_HITS canonical_usages=$CANONICAL_HITS"
            if [[ "$FORBIDDEN_HITS" -gt 0 ]]; then
              echo "::error::Pitfall 7 (silent updater signature failure): TAURI_UPDATER_PRIVATE_KEY_PASSWORD used in $f — Tauri docs alternate the two names; pick TAURI_UPDATER_KEY_PASSWORD per tauri/src-tauri/keys/README.md and align all three files."
              FAIL=1
            fi
          done
          # Canonical name must appear ≥1 in usage position in release.yml AND
          # sign_manifest.sh. tauri.conf.json5 references the PUBKEY not the password.
          REL_BODY=$(grep -v '^[[:space:]]*#' .github/workflows/release.yml)
          SCR_BODY=$(grep -v '^[[:space:]]*#' scripts/dist/sign_manifest.sh)
          RELEASE_CANON=$(printf '%s\n' "$REL_BODY" | grep -E "${USAGE_RE}TAURI_UPDATER_KEY_PASSWORD" -c || true)
          SCRIPT_CANON=$(printf '%s\n' "$SCR_BODY" | grep -E "${USAGE_RE}TAURI_UPDATER_KEY_PASSWORD" -c || true)
          if [[ "$RELEASE_CANON" -lt 1 ]]; then
            echo "::error::Pitfall 7: canonical TAURI_UPDATER_KEY_PASSWORD has no usage-pattern hit in release.yml — pipeline cannot sign manifest."
            FAIL=1
          fi
          if [[ "$SCRIPT_CANON" -lt 1 ]]; then
            echo "::error::Pitfall 7: canonical TAURI_UPDATER_KEY_PASSWORD has no usage-pattern hit in sign_manifest.sh — pipeline cannot sign manifest."
            FAIL=1
          fi
          if [[ "$FAIL" -ne 0 ]]; then
            exit 1
          fi
          echo "secret-name-audit (password) — OK: only TAURI_UPDATER_KEY_PASSWORD used as env var across all 3 files."

      - name: Assert TAURI_UPDATER_PRIVATE_KEY referenced consistently
        # Same usage-pattern matching: catches actual env-var refs, ignores
        # mentions inside the audit step's own assertion strings.
        run: |
          set -e
          USAGE_RE='(\$\{?|secrets\.|env:[[:space:]]+|: ?"?\$\{|^[[:space:]]*[A-Z_]*=)'
          REL_BODY=$(grep -v '^[[:space:]]*#' .github/workflows/release.yml)
          SCR_BODY=$(grep -v '^[[:space:]]*#' scripts/dist/sign_manifest.sh)
          # Match TAURI_UPDATER_PRIVATE_KEY but NOT TAURI_UPDATER_PRIVATE_KEY_PASSWORD
          # (so the forbidden-password name doesn't satisfy this gate by accident).
          RELEASE_HITS=$(printf '%s\n' "$REL_BODY" | grep -E "${USAGE_RE}TAURI_UPDATER_PRIVATE_KEY([^A-Z_]|\$)" -c || true)
          SCRIPT_HITS=$(printf '%s\n' "$SCR_BODY" | grep -E "${USAGE_RE}TAURI_UPDATER_PRIVATE_KEY([^A-Z_]|\$)" -c || true)
          echo "  release.yml → TAURI_UPDATER_PRIVATE_KEY usages=$RELEASE_HITS"
          echo "  sign_manifest.sh → TAURI_UPDATER_PRIVATE_KEY usages=$SCRIPT_HITS"
          if [[ "$RELEASE_HITS" -lt 1 ]]; then
            echo "::error::Pitfall 7: TAURI_UPDATER_PRIVATE_KEY has no usage-pattern hit in release.yml — release-publish job cannot wire the secret."
            exit 1
          fi
          if [[ "$SCRIPT_HITS" -lt 1 ]]; then
            echo "::error::Pitfall 7: TAURI_UPDATER_PRIVATE_KEY has no usage-pattern hit in sign_manifest.sh — manifest signer cannot materialise the key."
            exit 1
          fi
          echo "secret-name-audit (private-key) — OK: TAURI_UPDATER_PRIVATE_KEY referenced consistently."

  placeholder-pubkey-gate:
    name: Reject placeholder updater pubkey
    runs-on: ubuntu-latest
    # Gate fires only on tagged release pushes; PRs and workflow_dispatch
    # skip this check so the dev loop is unblocked while Kaan generates the
    # keypair. Tagged releases MUST have the real pubkey baked in.
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - name: Verify pubkey is not the Phase 18-04 placeholder
        run: |
          set -e
          if grep -q 'TAURI_UPDATER_PLACEHOLDER\|dW50cnVzdGVkIGNvbW1lbnQ6IFRBVVJJX1VQREFURVJfUExBQ0VIT0xERVI=' tauri/src-tauri/tauri.conf.json5; then
            echo "::error::tauri.conf.json5 still contains the TAURI_UPDATER_PLACEHOLDER pubkey." >&2
            echo "::error::Generate a real keypair per tauri/src-tauri/keys/README.md and replace the placeholder before tagging." >&2
            exit 1
          fi
          echo "Pubkey placeholder gate clean."

  # ---------------------------------------------------------------------------
  # Wave 1 — Parallel build matrix.
  # ---------------------------------------------------------------------------

  build-macos:
    name: Build macOS (${{ matrix.arch }})
    # Plan 27-06 / REC-09 carry-forward: matrix builds BOTH arm64 + x86_64
    # PyInstaller sidecars on their native runners so Apple Silicon users
    # never see the Rosetta translation prompt on first launch (Pitfall P69).
    # NEVER lipo-merge the two outputs — RESEARCH §Critical Correction:
    # PyInstaller embeds its PKG archive in only the last merged slice;
    # the other arch silently segfaults at app launch.
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-14
            target_triple: aarch64-apple-darwin
            rust_target: aarch64-apple-darwin
          - arch: x86_64
            runner: macos-13
            target_triple: x86_64-apple-darwin
            rust_target: x86_64-apple-darwin
    runs-on: ${{ matrix.runner }}
    needs: [detect-signing-mode, placeholder-pubkey-gate]
    # `always()` keeps this job alive when placeholder-pubkey-gate is SKIPPED
    # (non-tag push); we only abort when it actually FAILED.
    if: always() && needs.placeholder-pubkey-gate.result != 'failure'
    env:
      SIGNING_AVAILABLE: ${{ needs.detect-signing-mode.outputs.signing_available }}
      DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || 'false' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: astral-sh/setup-uv@v3

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Install macOS build deps (create-dmg)
        run: |
          brew install create-dmg

      # ---- Stage 1 — BUILD --------------------------------------------------
      - name: BUILD — PyInstaller sidecar via build_sidecar.py (${{ matrix.arch }})
        run: |
          uv sync --frozen
          uv run python scripts/build_sidecar.py \
            --spec vibemix-core.macos.spec \
            --target-arch ${{ matrix.arch }}

      - name: VERIFY single-arch (Pitfall P69 critical correction)
        run: |
          BIN="tauri/src-tauri/binaries/vibemix-core-${{ matrix.target_triple }}/vibemix-core-${{ matrix.target_triple }}"
          test -f "$BIN" || ( echo "missing artifact: $BIN" && exit 1 )
          ARCHS=$(lipo -archs "$BIN")
          test "$ARCHS" = "${{ matrix.arch }}" || \
            ( echo "REC-09 violation: expected single-arch ${{ matrix.arch }}; got $ARCHS" && exit 1 )
          echo "OK: $BIN is single-arch ${{ matrix.arch }}"

      - name: BUILD — Tauri app (cargo tauri build)
        working-directory: tauri
        run: |
          npm ci
          npm run build
          cd src-tauri
          cargo tauri build --target ${{ matrix.rust_target }}

      # ---- Stage 2 + 3 — SIGN + PACKAGE (DMG + notarize + staple) ----------
      # Phase 38 DIST-15 — Apple notarytool wiring annotation step.
      # When SIGNING_AVAILABLE != 'true' (Apple Dev secrets absent) the actual
      # sign step is silently skipped by the gate above. This annotation makes
      # the skip EXPLICIT in CI logs and points operators at KAAN-ACTION-LEGAL.md
      # DIST-09 (Francesco-action, legal capacity — Pitfall P46 carveout).
      - name: SIGN — Apple notarytool wiring annotation (empty-secret skip)
        if: env.SIGNING_AVAILABLE != 'true'
        run: |
          echo "::warning::Apple Dev ID secrets absent — see KAAN-ACTION-LEGAL.md DIST-09 (Francesco-action) + DIST-11. xcrun notarytool step skipped."
          echo "  expected secrets (Kaan creates after Apple approves):"
          echo "    APPLE_DEVELOPER_ID_P12_BASE64, APPLE_DEVELOPER_ID_PASSWORD,"
          echo "    APPLE_TEAM_ID, APPLE_API_KEY_ID, APPLE_API_KEY_ISSUER, APPLE_API_KEY_P8"

      - name: SIGN + PACKAGE — codesign / create-dmg / notarytool / stapler
        if: env.SIGNING_AVAILABLE == 'true' && env.DRY_RUN != 'true'
        env:
          APPLE_DEVELOPER_ID: ${{ secrets.APPLE_DEVELOPER_ID }}
          APPLE_DEVELOPER_ID_P12_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_P12_BASE64 }}
          APPLE_DEVELOPER_ID_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_PASSWORD }}
          APPLE_DEVELOPER_ID_KEYCHAIN_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_KEYCHAIN_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_KEY_ISSUER: ${{ secrets.APPLE_API_KEY_ISSUER }}
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
          CI: "true"
        run: |
          set +x   # secret env vars in scope — never echo
          chmod +x scripts/dist/sign_macos.sh
          ./scripts/dist/sign_macos.sh tauri/src-tauri/target/${{ matrix.rust_target }}/release/bundle/macos/vibemix.app

      # ---- Stage 4 — VERIFY (ALWAYS runs, even in mock-signing) ------------
      - name: VERIFY — AIza scan + key-pattern grep (post-sign or unsigned)
        run: |
          # In full-mode the signed + notarized + stapled DMG is the canonical
          # leak-detection surface (signing rewrites Mach-O headers and could
          # in theory re-introduce a leak; checking post-sign is the gate).
          # In mock-mode we still scan the unsigned .app so a leaked key in a
          # PR cannot reach a tagged release through a green CI run.
          if [[ "$SIGNING_AVAILABLE" == "true" && "$DRY_RUN" != "true" ]]; then
            TARGET=$(ls dist/vibemix-*.dmg 2>/dev/null | head -1 || echo "")
            if [[ -z "$TARGET" || ! -f "$TARGET" ]]; then
              TARGET="tauri/src-tauri/target/${{ matrix.rust_target }}/release/bundle/macos/vibemix.app"
            fi
          else
            TARGET="tauri/src-tauri/target/${{ matrix.rust_target }}/release/bundle/macos/vibemix.app"
          fi
          echo "Verifying: $TARGET"
          mkdir -p dist
          uv run python -m scripts.dist.verify_binary "$TARGET" --report dist/verify-report-macos.json

      # ---- Stage 5 — UPLOAD artifact for publish job ------------------------
      # Plan 27-06 / REC-09: per-arch artifact name keeps the two matrix
      # outputs distinct. Publish job downloads both and uploads them as
      # separate release assets (no lipo-merge — see RESEARCH §Critical
      # Correction).
      - name: Upload macOS artifacts (mock or signed) — ${{ matrix.arch }}
        uses: actions/upload-artifact@v4
        with:
          name: macos-artifacts-${{ matrix.arch }}
          path: |
            dist/vibemix-*.dmg
            tauri/src-tauri/target/${{ matrix.rust_target }}/release/bundle/macos/vibemix.app
            tauri/src-tauri/binaries/vibemix-core-${{ matrix.target_triple }}/
            dist/verify-report-macos.json
          if-no-files-found: warn
          retention-days: 7

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    needs: [detect-signing-mode, placeholder-pubkey-gate]
    if: always() && needs.placeholder-pubkey-gate.result != 'failure'
    env:
      SIGNING_AVAILABLE: ${{ needs.detect-signing-mode.outputs.signing_available }}
      DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || 'false' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: astral-sh/setup-uv@v3

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Inno Setup 6 (chocolatey)
        shell: pwsh
        run: |
          # Pin to 6.4.x per Phase 18 CONTEXT §specifics.
          choco install innosetup --version=6.4.0 -y --no-progress

      - name: Download VC++ 2015-2022 Redistributable (x64)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path installer/windows/redist | Out-Null
          # aka.ms permalink redirects to the current 14.x release; PyInstaller
          # bundles need the VC++ runtime on stripped Win 11 installs.
          Invoke-WebRequest -Uri "https://aka.ms/vs/17/release/vc_redist.x64.exe" -OutFile installer/windows/redist/vc_redist.x64.exe

      # ---- Stage 1 — BUILD --------------------------------------------------
      - name: BUILD — PyInstaller sidecar via build_sidecar.py
        shell: pwsh
        run: |
          uv sync --frozen
          uv run python scripts/build_sidecar.py --spec vibemix-core.windows.spec

      - name: BUILD — Tauri app (cargo tauri build)
        working-directory: tauri
        shell: pwsh
        run: |
          npm ci
          npm run build
          cd src-tauri
          cargo tauri build

      - name: BUILD — Upload unsigned binaries for SignPath request
        if: env.SIGNING_AVAILABLE == 'true' && env.DRY_RUN != 'true'
        id: upload-unsigned
        uses: actions/upload-artifact@v4
        with:
          name: vibemix-binaries-unsigned
          path: |
            dist/vibemix/vibemix.exe
            dist/vibemix/_internal/**
          retention-days: 1

      # ---- Stage 2 — SIGN (SignPath OSS flow per Plan 18-03) ---------------
      # Phase 38 DIST-16 — SignPath wiring annotation step.
      # When SIGNING_AVAILABLE != 'true' the SignPath submission step is silently
      # skipped. This annotation makes the skip EXPLICIT and points operators at
      # KAAN-ACTION-LEGAL.md DIST-11 (Kaan-action — SignPath OSS Foundation
      # application has a ~1-week SLA from submission; Pitfall P46 carveout).
      - name: SIGN — SignPath wiring annotation (empty-secret skip)
        if: env.SIGNING_AVAILABLE != 'true'
        shell: pwsh
        run: |
          Write-Host "::warning::SignPath approval pending — see KAAN-ACTION-LEGAL.md DIST-11 (Kaan-action). signpath/github-action-submit-signing-request step skipped."
          Write-Host "  expected secrets (Kaan creates after SignPath approves):"
          Write-Host "    SIGNPATH_API_TOKEN, SIGNPATH_ORGANIZATION_ID,"
          Write-Host "    SIGNPATH_PROJECT_SLUG, SIGNPATH_SIGNING_POLICY_SLUG"

      - name: SIGN — Submit signing request to SignPath
        if: env.SIGNING_AVAILABLE == 'true' && env.DRY_RUN != 'true'
        uses: signpath/github-action-submit-signing-request@v1.2.0
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ secrets.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ secrets.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ secrets.SIGNPATH_SIGNING_POLICY_SLUG }}
          artifact-configuration-slug: vibemix-binaries
          github-artifact-id: ${{ steps.upload-unsigned.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: dist/signed-binaries/

      # ---- Stage 3 — PACKAGE (Inno Setup compile → vibemix-installer.msi) --
      - name: PACKAGE — Compile vibemix-installer.msi via ISCC
        if: env.SIGNING_AVAILABLE == 'true' && env.DRY_RUN != 'true'
        shell: pwsh
        env:
          SIGNPATH_SIGNTOOL_CMD: ${{ secrets.SIGNPATH_SIGNTOOL_CMD }}
        run: |
          # Strip the leading 'v' from tag refs: refs/tags/v0.1.0 → 0.1.0
          $rawRef = "${env:GITHUB_REF}"
          if ($rawRef -like "refs/tags/v*") {
            $version = $rawRef -replace "^refs/tags/v",""
          } else {
            $version = "0.0.0-dispatch"
          }
          # version.txt is consumed by GetFileVersion() in the .iss header.
          Set-Content -Path installer/windows/version.txt -Value $version
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\iscc.exe"
          if (-not (Test-Path $iscc)) { $iscc = "$env:ProgramFiles\Inno Setup 6\iscc.exe" }
          & "$iscc" `
              "/DAppVersion=$version" `
              "/DSourceDir=..\..\dist\signed-binaries" `
              "/DOutputDir=..\..\output" `
              "installer\windows\vibemix-installer.iss"

      # ---- Stage 4 — VERIFY (ALWAYS runs, even in mock-signing) ------------
      - name: VERIFY — AIza scan + key-pattern grep (post-sign or unsigned)
        shell: pwsh
        run: |
          if ($env:SIGNING_AVAILABLE -eq "true" -and $env:DRY_RUN -ne "true" -and (Test-Path "output/vibemix-installer.msi")) {
            $target = "output/vibemix-installer.msi"
          } else {
            $target = "dist/vibemix/vibemix.exe"
          }
          Write-Host "Verifying: $target"
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          uv run python -m scripts.dist.verify_binary $target --report dist/verify-report-windows.json

      # ---- Stage 5 — UPLOAD artifact ----------------------------------------
      - name: Upload Windows artifacts (mock or signed)
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: |
            output/vibemix-installer.msi
            dist/vibemix/vibemix.exe
            dist/verify-report-windows.json
          if-no-files-found: warn
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Wave 1.5 — Post-sign verifier publish gate (Phase 38 DIST-17).
  # ---------------------------------------------------------------------------
  # Activates the Phase 34 verify_signed.py surface as a HARD gate before
  # release-publish runs. Fails the build if any signed artifact lacks the
  # platform-specific signing surface (Mach-O LC_CODE_SIGNATURE for .dmg/.pkg,
  # PE MZ header for .msi/.exe). Tag-gated AND signing-mode-gated so forks +
  # mock-mode never reach it.

  verify-signed-publish-gate:
    name: Verify signed artifacts (publish gate)
    runs-on: ubuntu-latest
    needs: [detect-signing-mode, build-macos, build-windows]
    if: startsWith(github.ref, 'refs/tags/v') && needs.detect-signing-mode.outputs.signing_available == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts/

      - name: Verify macOS DMG (arm64) — DIST-17 require-signed gate
        run: |
          set -euo pipefail
          DMG=$(ls release-artifacts/macos-artifacts-arm64/vibemix-*.dmg 2>/dev/null | head -1)
          if [[ -z "$DMG" ]]; then
            echo "::error::No arm64 DMG found in release-artifacts/"
            exit 1
          fi
          python scripts/dist/verify_signed.py --artifact "$DMG" --require-signed

      - name: Verify macOS DMG (x86_64) — DIST-17 require-signed gate
        run: |
          set -euo pipefail
          DMG=$(ls release-artifacts/macos-artifacts-x86_64/vibemix-*.dmg 2>/dev/null | head -1)
          if [[ -z "$DMG" ]]; then
            echo "::error::No x86_64 DMG found in release-artifacts/"
            exit 1
          fi
          python scripts/dist/verify_signed.py --artifact "$DMG" --require-signed

      - name: Verify Windows MSI — DIST-17 require-signed gate
        run: |
          set -euo pipefail
          MSI=release-artifacts/windows-artifacts/vibemix-installer.msi
          if [[ ! -f "$MSI" ]]; then
            echo "::error::Windows MSI missing at $MSI"
            exit 1
          fi
          python scripts/dist/verify_signed.py --artifact "$MSI" --require-signed

  # ---------------------------------------------------------------------------
  # Wave 2 — Publish to GitHub Releases + sign + POST updater manifest.
  # ---------------------------------------------------------------------------

  release-publish:
    name: Publish to GitHub Releases + sign manifest
    runs-on: ubuntu-latest
    needs: [detect-signing-mode, build-macos, build-windows, verify-signed-publish-gate]
    # Tag-gated AND secrets-gated AND verifier-gated. PR / workflow_dispatch /
    # mock-mode never reaches this job — protecting against accidental publish
    # from a fork. Phase 38 DIST-17 adds the verifier gate.
    if: startsWith(github.ref, 'refs/tags/v') && needs.detect-signing-mode.outputs.signing_available == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts/

      - name: PUBLISH — Sign updater manifest (latest.json) via Tauri signer
        env:
          TAURI_UPDATER_PRIVATE_KEY: ${{ secrets.TAURI_UPDATER_PRIVATE_KEY }}
          TAURI_UPDATER_KEY_PASSWORD: ${{ secrets.TAURI_UPDATER_KEY_PASSWORD }}
        run: |
          set +x   # private key value must NEVER hit logs
          chmod +x scripts/dist/sign_manifest.sh
          VERSION="${GITHUB_REF#refs/tags/v}"
          # Plan 27-06 / REC-09: per-arch artifacts live under
          # release-artifacts/macos-artifacts-arm64/ + macos-artifacts-x86_64/.
          # Manifest URL points at the arm64 DMG (current default for the
          # majority of macOS users); v2.2 may add per-arch updater entries.
          MACOS_DMG=$(ls release-artifacts/macos-artifacts-arm64/vibemix-*.dmg 2>/dev/null | head -1)
          MACOS_BASENAME=$(basename "$MACOS_DMG")
          ./scripts/dist/sign_manifest.sh \
              --version "$VERSION" \
              --macos-url "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/${MACOS_BASENAME}" \
              --windows-url "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/vibemix-installer.msi" \
              --notes "Release ${{ github.ref_name }}" \
              --output release-artifacts/latest.json

      - name: PUBLISH — POST signed manifest to api.altidus.world
        env:
          BRAVOH_MANIFEST_UPLOAD_TOKEN: ${{ secrets.BRAVOH_MANIFEST_UPLOAD_TOKEN }}
        run: |
          set +x   # bearer token must NEVER hit logs
          # Best-effort POST — endpoint may 404 until Bravoh ops deploys
          # /vibemix/updates/upload per docs/updater.md §Server contract.
          # The workflow does NOT fail on 404; the manifest is also attached
          # to the GitHub Release for fallback consumption.
          if [[ -n "${BRAVOH_MANIFEST_UPLOAD_TOKEN:-}" ]]; then
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
                -X POST \
                -H "Authorization: Bearer ${BRAVOH_MANIFEST_UPLOAD_TOKEN}" \
                -H "Content-Type: application/json" \
                --data-binary @release-artifacts/latest.json \
                "https://api.altidus.world/vibemix/updates/upload" || echo "000")
            echo "Manifest POST → HTTP ${HTTP_CODE}"
            if [[ "$HTTP_CODE" == "404" ]]; then
              echo "::warning::api.altidus.world/vibemix/updates/upload returned 404 — Bravoh-side endpoint not yet deployed. Manifest will be served from GitHub Releases until then."
            elif [[ "$HTTP_CODE" != "200" && "$HTTP_CODE" != "201" && "$HTTP_CODE" != "202" && "$HTTP_CODE" != "204" ]]; then
              echo "::warning::Unexpected HTTP ${HTTP_CODE} from manifest upload — manifest still attached to GH Release."
            fi
          else
            echo "::warning::BRAVOH_MANIFEST_UPLOAD_TOKEN absent — skipping manifest POST."
          fi

      - name: PUBLISH — Create GitHub Release (draft) with all signed artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-artifacts/macos-artifacts-arm64/vibemix-*.dmg
            release-artifacts/macos-artifacts-x86_64/vibemix-*.dmg
            release-artifacts/windows-artifacts/vibemix-installer.msi
            release-artifacts/latest.json
            release-artifacts/macos-artifacts-arm64/verify-report-macos.json
            release-artifacts/macos-artifacts-x86_64/verify-report-macos.json
            release-artifacts/windows-artifacts/verify-report-windows.json
          # v1 draft → Kaan reviews + clicks Publish manually. v2 can flip
          # to false once fresh-machine rehearsal is wired in Phase 20.
          draft: true
          body: |
            ## vibemix ${{ github.ref_name }}

            Signed builds for macOS (Apple Silicon) + Windows (x64). The
            attached `latest.json` is the Tauri-signed updater manifest
            consumed by `api.altidus.world/vibemix/updates/...` per
            `docs/updater.md`.

            ### Verification

            `verify-report-macos.json` + `verify-report-windows.json` confirm
            zero `AIza`/`AKIA`/`ya29.`/`sk-` key patterns + zero 39-char
            Google-key shapes detected in the signed bundles
            (Plan 18-01 leak-detection gate).

            ### Install

            - **macOS:** download the `.dmg`, open, drag `vibemix.app` to
              `/Applications`.
            - **Windows:** download `vibemix-installer.msi`, double-click,
              follow the installer.

            Update prompts honour the `update_check_on_launch` setting in
            the Settings drawer (default `true`; opt-out per
            `docs/updater.md`).
          token: ${{ secrets.GITHUB_TOKEN }}
