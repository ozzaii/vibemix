name: README Hero Sync

# Phase 35 Plan 35-03 / ASSETS-07 / Pitfall P68 —
# detect drift between the README hero block (sha256 comment) and the
# real docs/assets/demo.mp4 asset. Runs on every PR, every push to main,
# and nightly so untouched-PR repos still surface drift.

on:
  push:
    branches: [main]
    paths:
      - "README.md"
      - "docs/assets/**"
      - "scripts/check_readme_hero_hash.py"
      - ".github/workflows/readme-hero-sync.yml"
  pull_request:
    paths:
      - "README.md"
      - "docs/assets/**"
      - "scripts/check_readme_hero_hash.py"
      - ".github/workflows/readme-hero-sync.yml"
  schedule:
    # 03:17 UTC daily — odd minute to dodge GitHub-Actions cron stampede.
    - cron: "17 3 * * *"
  workflow_dispatch: {}

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          # We need the asset itself for hashing — checkout @ default
          # depth fine since LFS isn't used yet.
          lfs: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run hash sync check
        run: python scripts/check_readme_hero_hash.py

      - name: Phase 47 / MASCOT-07 — assert hero render assets exist
        run: |
          test -f docs/assets/readme-hero.png || (echo "missing docs/assets/readme-hero.png" && exit 1)
          test -f docs/assets/readme-hero.webm || (echo "missing docs/assets/readme-hero.webm" && exit 1)
          png_bytes=$(stat -c '%s' docs/assets/readme-hero.png)
          webm_bytes=$(stat -c '%s' docs/assets/readme-hero.webm)
          [ "$png_bytes" -le $((50 * 1024)) ] || (echo "readme-hero.png exceeds 50 KB ($png_bytes bytes)" && exit 1)
          [ "$webm_bytes" -le $((100 * 1024)) ] || (echo "readme-hero.webm exceeds 100 KB ($webm_bytes bytes)" && exit 1)
          echo "Phase 47 hero assets present + within size guards"
