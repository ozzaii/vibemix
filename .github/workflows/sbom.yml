# Phase 34 / SEC-04 — SBOM generation + release attachment.
#
# syft v1.14.0 — SPDX 2.3 format. Attaches sbom.spdx.json to the GitHub
# Release as an artifact alongside DMG/MSI/manifest.

name: SBOM

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_id:
        description: "Optional release id to attach to (workflow_dispatch only)"
        required: false
        type: string

permissions:
  contents: write   # required to upload SBOM as release asset

jobs:
  sbom:
    name: syft SBOM
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Generate SBOM (Python + Rust + filesystem)
        uses: anchore/sbom-action@d94f46e13c6c62f59525ac9a1e147a99dc0b9bf5 # v0.17.0
        with:
          path: .
          format: spdx-json
          output-file: sbom.spdx.json
          # Use syft default catalogers — covers Python, Rust, Node, generic
          # filesystem packaging.

      - name: Validate SBOM JSON
        run: |
          set -euo pipefail
          python -c "import json; d = json.load(open('sbom.spdx.json')); \
            assert d['spdxVersion'].startswith('SPDX-'), 'invalid SPDX version'; \
            assert len(d.get('packages', [])) > 0, 'SBOM has no packages'; \
            print(f\"SBOM ok — {len(d['packages'])} packages, version {d['spdxVersion']}\")"

      - name: Upload SBOM as release asset
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          files: sbom.spdx.json
          fail_on_unmatched_files: true

      - name: Upload SBOM as workflow artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: sbom-spdx-json
          path: sbom.spdx.json
          retention-days: 90

  cyclonedx-sbom:
    name: cyclonedx SBOM (Python + Rust + JS)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'

      - name: Generate CycloneDX SBOMs
        run: bash scripts/audit/gen_cyclonedx.sh

      - name: Validate CycloneDX JSON
        run: |
          set -euo pipefail
          for f in dist/sbom/vibemix.cdx.json dist/sbom/vibemix.python.cdx.json dist/sbom/vibemix.rust.cdx.json dist/sbom/vibemix.js.cdx.json; do
            python -c "import json; d = json.load(open('$f')); assert d.get('bomFormat') == 'CycloneDX', f'bad bomFormat in $f'; print(f'  ok: $f ({len(d.get(\"components\", []))} components)')"
          done

      - name: Upload CycloneDX SBOM(s) as release assets
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          files: |
            dist/sbom/vibemix.cdx.json
            dist/sbom/vibemix.python.cdx.json
            dist/sbom/vibemix.rust.cdx.json
            dist/sbom/vibemix.js.cdx.json
          fail_on_unmatched_files: true

      - name: Upload CycloneDX SBOMs as workflow artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: sbom-cdx-json
          path: dist/sbom/*.cdx.json
          retention-days: 90
