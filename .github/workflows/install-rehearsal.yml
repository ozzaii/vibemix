# Phase 33 / Plan 33-08 — Fresh-VM install rehearsal CI.
#
# Runs the rehearsal orchestrator in --dry-run mode on every dispatch.
# Real VM execution stays Kaan-action (disk space + macOS license +
# fresh ISOs — see KAAN-ACTION-LEGAL.md INSTALL-VM-RUN).
#
# Gating: workflow_dispatch only + nightly cron at 03:00 UTC. We do NOT
# run on every PR — VM operations cost real resources even in dry-run
# (the test scaffold script reads + parses, which is cheap, but we
# keep the cadence intentional).

name: Install Rehearsal (scaffold)

on:
  workflow_dispatch: {}
  schedule:
    - cron: '0 3 * * *'  # nightly @ 03:00 UTC

permissions:
  contents: read

jobs:
  rehearsal-dry-run:
    name: Install rehearsal — dry-run only
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Rehearsal orchestrator dry-run
        run: |
          set -euo pipefail
          python scripts/install_rehearsal/rehearsal_runner.py --matrix all

      - name: Scaffold test gate
        run: |
          set -euo pipefail
          pip install pytest
          python -m pytest tests/install/test_rehearsal_scaffold.py -v

      # Phase 49 — 60s onboarding gate (simulated on CI; real-VM gated on
      # Kaan-action §INSTALL-VM-RUN).
      - name: Check 60s onboarding gate (simulated)
        env:
          GITHUB_REF_TYPE: ${{ github.ref_type }}
        run: |
          set -euo pipefail
          bash scripts/dist/install_vm_matrix.sh --simulate --check-60s

      # Phase 49 — companion fetch + manifest + 60s-gate test suite.
      - name: Companion + 60s test suite
        run: |
          set -euo pipefail
          python -m pytest tests/install/test_driver_manifest_schema.py tests/install/test_audio_config.py tests/install/test_iss_companion_run.py tests/install/test_dmg_postinstall_hook.py tests/dist/test_60s_gate.py tests/audit/test_companion_signing_gate.py -v
