# Phase 34 / SEC-01 — gitleaks secret scan.
#
# Runs on:
#   - pull_request (block PRs with leaked secrets)
#   - push: main   (catch direct pushes)
#
# Discipline (Pitfall P64):
#   - The baseline is surgical, AIza-fixture only.
#   - This workflow fails on any finding NOT in `.secrets.baseline`.
#   - `--redact` ensures findings are never echoed verbatim in logs.

name: Secret Scan

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  gitleaks:
    name: gitleaks scan
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0  # full history — needed for git log scanning

      - name: Install gitleaks
        run: |
          set -euo pipefail
          curl -sSL -o gitleaks.tar.gz \
            https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz
          tar -xzf gitleaks.tar.gz
          sudo mv gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Scan repository (committed history)
        run: |
          set -euo pipefail
          gitleaks detect \
            --config=.gitleaks.toml \
            --baseline-path=.secrets.baseline \
            --redact \
            --verbose \
            --report-format=sarif \
            --report-path=gitleaks-report.sarif

      - name: Scan staged + working tree
        # On PRs we also want to catch secrets that haven't been committed yet
        # but are in the merge candidate. `protect` mode scans unstaged changes.
        if: github.event_name == 'pull_request'
        run: |
          set -euo pipefail
          gitleaks protect \
            --config=.gitleaks.toml \
            --baseline-path=.secrets.baseline \
            --redact \
            --verbose || true
          # `protect` is informational; `detect` above is the gate.

      - name: Upload SARIF
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: gitleaks-sarif
          path: gitleaks-report.sarif
          retention-days: 14
