# Phase 46 / DEPS-01,02,03 — Dependency audit gate.
#
# Hermetic Python lockfile regen + drift detection (DEPS-01).
# cargo-deny license policy (DEPS-02).
# npm-audit PR comment (DEPS-03).
# Plan 03 adds the AUDIT.md freshness gate.
# Plan 04 adds CycloneDX SBOM job + dep-cull verify.
# Plan 05 adds pinact audit job.
#
# Pitfall 1: `pip freeze` from `.venv` is REJECTED — only the hermetic
# docker-uv path is allowed to mutate uv.lock.

name: Dependency Audit

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'pyproject.toml'
      - 'uv.lock'
      - 'scripts/audit/**'
      - '.github/workflows/dep-audit.yml'
      - 'tauri/src-tauri/Cargo.toml'
      - 'tauri/src-tauri/Cargo.lock'
      - 'tauri/src-tauri/deny.toml'
      - 'tauri/ui/package.json'
      - 'tauri/ui/package-lock.json'
      - 'docs/AUDIT.md'
      - 'docs/dep-opportunities/**'
      - 'docs/integrations/**'
      - '.planning/decisions/DEP-OPP-*.md'
  push:
    branches: [main]
    paths:
      - 'pyproject.toml'
      - 'uv.lock'
      - 'scripts/audit/**'
      - 'tauri/src-tauri/Cargo.toml'
      - 'tauri/src-tauri/Cargo.lock'
      - 'tauri/src-tauri/deny.toml'
      - 'tauri/ui/package.json'
      - 'tauri/ui/package-lock.json'
      - 'docs/AUDIT.md'
      - 'docs/dep-opportunities/**'
      - 'docs/integrations/**'
      - '.planning/decisions/DEP-OPP-*.md'
  workflow_dispatch:

concurrency:
  group: dep-audit-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  uv-regen-diff:
    name: Hermetic uv.lock regen + drift check (DEPS-01)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Run hermetic regen script
        run: bash scripts/audit/regen_uv_lock.sh

      - name: Fail on lockfile drift
        run: |
          set -euo pipefail
          if ! git diff --exit-code uv.lock; then
            echo "::error::uv.lock drifted after hermetic regen — re-run scripts/audit/regen_uv_lock.sh locally and commit the result"
            exit 1
          fi
          echo "uv.lock is byte-stable against pyproject.toml — DEPS-01 OK"

  cargo-deny:
    name: cargo-deny license policy (DEPS-02)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: tauri/src-tauri
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-deny (pinned)
        run: cargo install cargo-deny --version 0.16.1 --locked --force

      - name: Run cargo-deny check (licenses + bans + sources + advisories)
        run: cargo deny --all-features check

  npm-audit-pr-comment:
    name: npm-audit PR comment (DEPS-03)
    runs-on: ubuntu-latest
    timeout-minutes: 8
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: tauri/ui/package-lock.json

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'

      - name: Run npm audit
        id: audit
        run: |
          bash scripts/audit/npm_audit_pr_comment.sh > /tmp/comment.md
          {
            echo 'comment<<EOF'
            cat /tmp/comment.md
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Post or update PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        with:
          script: |
            const body = `${{ steps.audit.outputs.comment }}`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.startsWith('## npm audit (tauri/ui'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  audit-md-freshness:
    name: AUDIT.md freshness gate (DEPS-05)
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0  # full history — git log -1 needs commit-time

      - name: Run freshness gate
        run: bash scripts/audit/check_audit_freshness.sh

  audit-md-gen-check:
    name: AUDIT.md generator drift (DEPS-04)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'

      - name: Install pyyaml
        run: pip install pyyaml

      - name: Run generator in --check mode
        run: python scripts/audit/gen_audit_md.py --check

  dep-cull-verify:
    name: Dep-cull verification (DEPS-08)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install ripgrep
        run: sudo apt-get install -y ripgrep

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'

      - name: Install pyyaml + jsonschema for the test
        run: pip install pyyaml jsonschema

      - name: Run dep-cull verification test
        run: python -m pytest tests/audit/test_dep_cull_complete.py -x --tb=short

  pinact-audit:
    name: GH Actions SHA pinning (DEPS-07)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Run pinact --check
        run: bash scripts/audit/run_pinact.sh --check

  opp-scan-validate:
    name: Opportunity-scan validate + anti-slop (OPP-03)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'

      - name: Install pyyaml + jsonschema
        run: pip install pyyaml jsonschema

      - name: Run opp-scan validator (md<->yaml parity + auto-Red + ADR-exists)
        run: python scripts/audit/scan_opportunities.py

      - name: Run anti-slop sibling checker (docs/dep-opportunities/)
        run: python scripts/audit/check_no_slop_opp.py

      - name: Run anti-slop sweep on docs/integrations/
        run: python scripts/audit/check_no_slop_opp.py --dir docs/integrations

      - name: Run anti-slop sweep on Yellow-defer stubs
        run: python scripts/audit/check_no_slop_opp.py --dir .planning/research/v3-buckets
