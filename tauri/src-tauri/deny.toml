# Phase 34 / SEC-03 — cargo-deny config.
#
# Discipline (Pitfall P65):
#   - advisories: deny HIGH+ on direct deps; deny CRITICAL anywhere; LOW/MEDIUM warn.
#   - bans: prevent accidental dual-version blowup that flags every audit.
#   - licenses: allow OSI-approved set; deny GPL family (vibemix is Apache-2.0,
#     can't ship GPL transitively without obligation).
#   - sources: only crates.io + locked GitHub mirrors.

[graph]
all-features = false
no-default-features = false

[advisories]
version = 2
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
# `yanked` and `notice` should warn (we get a chance to react).
yanked = "warn"
ignore = []

[licenses]
version = 2
# OSI-approved + permissive licenses we accept.
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "0BSD",
    "CC0-1.0",
    "MPL-2.0",
]
confidence-threshold = 0.8
exceptions = []
# DEPS-02: explicit deny list for GPL family. Omission from `allow`
# already denies these, but `deny` makes the policy self-documenting
# and produces a clearer error message in CI output.
deny = [
    "GPL-2.0-only",
    "GPL-2.0-or-later",
    "GPL-3.0-only",
    "GPL-3.0-or-later",
    "AGPL-3.0-only",
    "AGPL-3.0-or-later",
    "LGPL-2.1-only",
    "LGPL-2.1-or-later",
    "LGPL-3.0-only",
    "LGPL-3.0-or-later",
]

[[licenses.clarify]]
crate = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
deny = []
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
