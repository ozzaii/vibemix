<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>vibemix</title>
    <!--
      Wizard UI surface — CDJ Whisper v5.

      Token system lifted verbatim from .planning/phases/14-cdj-whisper-v5-migration-polish/
      14-UI-SPEC.md via tokens.css. Components render the 3-step calibration
      wizard with the deep-glass + amber sign-of-life aesthetic from
      mocks/vibemix-direction-final.html.

      Phase 14 Wave 1 collapsed the wizard grid to single-column — the
      256×256 mascot-corner is gone (Phase 13 mascot is now an overlay
      window, not embedded). IPC wiring lives in src/wizard/router.ts.
    -->
    <link rel="stylesheet" href="/src/tokens.css" />
  </head>
  <body>
    <div id="wizard-app" class="wizard-app">
      <header class="titlebar">
        <div class="traffic-spacer" aria-hidden="true"></div>
        <div class="wordmark">vibemix</div>
        <div class="clock" id="wizard-clock" aria-hidden="true">00:00</div>
      </header>
      <main class="wizard-content">
        <div id="wizard-step-strip"></div>
        <div class="wizard-grid">
          <section id="wizard-primary" class="primary-panel-mount"></section>
        </div>
        <div id="wizard-cta-row" class="cta-row"></div>
      </main>
      <footer id="status-bar" class="status-bar"></footer>
      <div id="crash-banner" hidden>
        <span class="icon" aria-hidden="true">⚠</span>
        <div class="crash-text">
          <div class="heading">VIBEMIX-CORE STOPPED</div>
          <div class="body" id="crash-error-line"></div>
        </div>
        <button id="crash-restart" type="button">[ Restart ]</button>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
