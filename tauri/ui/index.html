<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>vibemix</title>
    <!--
      Phase 11 Wave 3 — wizard UI surfaces.

      Token system lifted verbatim from .planning/phases/11-tauri-shell-calibration-wizard/11-UI-SPEC.md
      via tokens.css. 11 components + 5 step modules render the 3-step
      calibration wizard with the anodised charcoal + phosphor amber
      retro-futurist-hardware aesthetic from mocks/vibemix-app-ui.html.

      Wave 4 wires the ipc.* requests + replaces window.__vibemixDev mocks
      with real device probes / MIDI listens.
    -->
    <link rel="stylesheet" href="/src/tokens.css" />
  </head>
  <body>
    <div id="wizard-app" class="wizard-app">
      <header class="titlebar">
        <div class="traffic-spacer" aria-hidden="true"></div>
        <div class="wordmark">vibemix</div>
        <div class="clock" id="wizard-clock" aria-hidden="true">00:00</div>
      </header>
      <main class="wizard-content">
        <div id="wizard-step-strip"></div>
        <div class="wizard-grid">
          <section id="wizard-primary" class="primary-panel-mount"></section>
          <aside id="mascot-corner"></aside>
        </div>
        <div id="wizard-cta-row" class="cta-row"></div>
      </main>
      <footer id="status-bar" class="status-bar"></footer>
      <div id="crash-banner" hidden>
        <span class="icon" aria-hidden="true">⚠</span>
        <div class="crash-text">
          <div class="heading">VIBEMIX-CORE STOPPED</div>
          <div class="body" id="crash-error-line"></div>
        </div>
        <button id="crash-restart" type="button">[ Restart ]</button>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
