# Mascot source-asset provenance manifest (Phase 47 / MASCOT-02).
#
# Tracks the original .fbx files downloaded from Mixamo per slot.
# Raw .fbx files are gitignored (Mixamo license: Adobe-account-only,
# no redistribution); this manifest is in-repo for the audit trail.
#
# Schema:
#   slots:
#     - slot: <slot stem matching scripts/mascot/retarget_to_neon_rebel.py SLOT_FAMILIES>
#       family: <legacy_prep | base | emotion | anticipation | reaction>
#       mixamo_search_term: <Mixamo search query Kaan used>
#       downloaded_at: <ISO-8601 UTC timestamp or null when still placeholder>
#       sha256_source: <hex digest of source .fbx, or null when placeholder>
#       draco_level: <0-10 compression level used by retarget CLI>
#       output_bytes: <size of final .glb, or null when placeholder>
#       status: <placeholder | retargeted>
#
# Status transitions: placeholder -> retargeted (when Kaan runs the CLI with --really)
# and the CLI updates the row in-place.
