# DEPS-04 — hand-authored ratings + rationale side-file.
# gen_audit_md.py reads this and joins it against the auto-extracted
# version + license from the lockfiles to produce docs/AUDIT.md.
#
# rating values: green | yellow | red
#   green  = pure-wheel/pure-JS/pure-Rust crate, zero native build
#            steps in the installer happy path
#   yellow = native dep with prebuilt wheels for Mac arm64+x86_64 AND
#            Win64, or Rust crate with `cc`/system lib that is satisfied
#            by the build chain; user-invisible
#   red    = requires system extension/driver/manual brew/winget,
#            or any installer prompt the user must consent to
#
# Driver-level deps (BlackHole, VB-CABLE, system MIDI) are NOT here —
# they are Phase 49 installer-companion concerns. This file rates the
# Python/Rust/JS package surface only.

python:
  google-genai:
    rating: green
    rationale: "Gemini-only AI surface (CLAUDE.md hard rule). Pure-Python; no native build."
  httpx:
    rating: green
    rationale: "HTTP client used by google-genai + livekit-agents transitives."
  keyring:
    rating: yellow
    rationale: "Native macOS Keychain / Windows Credential Locker integration via pure-Python ctypes; no compile step."
  livekit-agents:
    rating: green
    rationale: "Gemini Live API wrapper (cohost_v2/lk variants). Pure-Python."
  livekit-plugins-google:
    rating: green
    rationale: "LiveKit Gemini adapter — the seam through which all Gemini Live audio flows."
  livekit-plugins-openai:
    rating: yellow
    rationale: "[CULL-BLOCKED] Used by src/vibemix/agent/tts_chain.py for the proxy TTS fallback chain. Cannot remove without rewiring the TTS chain — out of scope for Phase 46."
  livekit:
    rating: yellow
    rationale: "WebRTC client; transitively pulls av + aiortc. Prebuilt wheels for Mac+Win64."
  numpy:
    rating: yellow
    rationale: "Audio math (RMS / FFT / BPM autocorr). Prebuilt wheels Mac arm64+x86_64 + Win64."
  scipy:
    rating: yellow
    rationale: "scipy.signal.resample_poly for 48kHz to 16kHz. Prebuilt wheels all platforms."
  sounddevice:
    rating: yellow
    rationale: "CoreAudio (Mac) + WASAPI (Win) bridge. Pure-Python over CFFI; system PortAudio resolved by the installer."
  mido:
    rating: green
    rationale: "MIDI message parsing (DDJ-FLX4 controller decode). Pure-Python."
  python-rtmidi:
    rating: yellow
    rationale: "Low-level MIDI I/O (mido backend). Prebuilt wheels Mac+Win64."
  pyrekordbox:
    rating: yellow
    rationale: "Rekordbox collection.xml parser. Installed with --no-deps (CONTEXT D-01); SQLCipher path dormant; stdlib-sqlite3 fallback."
  bidict:
    rating: green
    rationale: "pyrekordbox transitive (declared explicitly per --no-deps recipe). Pure-Python."
  construct:
    rating: green
    rationale: "pyrekordbox transitive — ANLZ binary parser. Pure-Python."
  SQLAlchemy:
    rating: yellow
    rationale: "pyrekordbox transitive — required for db6 import chain even when SQLCipher dormant. Prebuilt wheels all platforms."
  psutil:
    rating: yellow
    rationale: "pyrekordbox transitive — Rekordbox process discovery. Prebuilt wheels all platforms."
  python-dateutil:
    rating: green
    rationale: "pyrekordbox transitive — date parsing. Pure-Python."
  mss:
    rating: green
    rationale: "Win32 screen capture (CoreGraphics on Mac uses ScreenCaptureKit). Pure-Python."
  pillow:
    rating: yellow
    rationale: "PIL image resize/crop before sending screenshot to Gemini. Prebuilt wheels all platforms."
  pyjwt:
    rating: green
    rationale: "JWT decode for LiveKit room token verification. Pure-Python."
  jsonschema:
    rating: green
    rationale: "JSON-schema validation (IPC schema gate, dep_ratings_schema). Pure-Python."
  websockets:
    rating: green
    rationale: "Mascot bus WebSocket server + LiveKit internals dep. Pure-Python."
  python-dotenv:
    rating: green
    rationale: "load_dotenv() for GEMINI_API_KEY ingest. Pure-Python."
  pyobjc-core:
    rating: yellow
    rationale: "PyObjC bridge for macOS APIs. macOS-only (sys_platform guard). Prebuilt wheels."
  pyobjc-framework-Cocoa:
    rating: yellow
    rationale: "Cocoa framework bindings (macOS-only). Prebuilt wheels."
  pyobjc-framework-Quartz:
    rating: yellow
    rationale: "Quartz window listing for djay-Pro window crop (macOS-only). Prebuilt wheels."
  pyobjc-framework-ScreenCaptureKit:
    rating: yellow
    rationale: "ScreenCaptureKit bindings for Phase 8 macOS capture path. Prebuilt wheels."
  pyobjc-framework-AVFoundation:
    rating: yellow
    rationale: "AVFoundation bindings (macOS-only). Prebuilt wheels."
  pyaudiowpatch:
    rating: yellow
    rationale: "PyAudio fork with WASAPI loopback (Win-only). Prebuilt wheels."
  pywin32:
    rating: yellow
    rationale: "Win32 API bindings (Win-only). Prebuilt wheels."
  winsdk:
    rating: yellow
    rationale: "Windows SDK Python projections — MediaRemote MMC equivalent on Win (Win-only)."
  sqlite-vec:
    rating: yellow
    rationale: "Vector ANN extension for sqlite — Phase 28 library intelligence. Prebuilt loadable extension."

