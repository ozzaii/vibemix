# DEPS-04 — hand-authored ratings + rationale side-file.
# gen_audit_md.py reads this and joins it against the auto-extracted
# version + license from the lockfiles to produce docs/AUDIT.md.
#
# rating values: green | yellow | red
#   green  = pure-wheel/pure-JS/pure-Rust crate, zero native build
#            steps in the installer happy path
#   yellow = native dep with prebuilt wheels for Mac arm64+x86_64 AND
#            Win64, or Rust crate with `cc`/system lib that is satisfied
#            by the build chain; user-invisible
#   red    = requires system extension/driver/manual brew/winget,
#            or any installer prompt the user must consent to
#
# Driver-level deps (BlackHole, VB-CABLE, system MIDI) are NOT here —
# they are Phase 49 installer-companion concerns. This file rates the
# Python/Rust/JS package surface only.

