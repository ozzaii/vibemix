<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720" role="img" aria-label="vibemix architecture diagram">
  <defs>
    <marker id="arrow-end" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ff8a3d"/>
    </marker>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="lane-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#020205" stop-opacity="1"/>
      <stop offset="1" stop-color="#05070b" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="1200" height="720" fill="#000000"/>
  <text x="600" y="24" text-anchor="middle" font-family="Saira, system-ui, sans-serif" font-size="14" fill="rgba(214, 207, 199, 0.65)" letter-spacing="3" style="text-transform:uppercase">vibemix architecture</text>
  <text x="24" y="54" font-family="Saira, system-ui, sans-serif" font-size="11" fill="rgba(214, 207, 199, 0.40)" letter-spacing="3" style="text-transform:uppercase">User Hardware</text>
  <rect x="24" y="62" width="1152" height="128" rx="10" ry="10" fill="url(#lane-bg)" stroke="rgba(255, 255, 255, 0.065)" stroke-width="1"/>
  <rect x="80" y="72" width="240" height="84" rx="8" ry="8" fill="#0a0c12" stroke="rgba(214, 207, 199, 0.22)" stroke-width="1"/>
  <text x="200" y="108" text-anchor="middle" font-family="Saira, system-ui, sans-serif" font-size="15" font-weight="600" fill="#d6cfc7">DJ Controller</text>
  <text x="200" y="132" text-anchor="middle" font-family="Saira, system-ui, sans-serif" font-size="11" fill="rgba(214, 207, 199, 0.65)">DDJ-FLX4 - 10 mapped + generic fallback</text>
  <rect x="360" y="72" width="300" height="84" rx="8" ry="8" fill="#0a0c12" stroke="rgba(214, 207, 199, 0.22)" stroke-width="1"/>
  <text x="510" y="108" text-anchor="middle" font-family="Saira, system-ui, sans-serif" font-size="15" font-weight="600" fill="#d6cfc7">Master output</text>
  <text x="510" y="132" text-anchor="middle" font-family="Saira, system-ui, sans-serif" font-size="11" fill="rgba(214, 207, 199, 0.65)">BlackHole 2ch (macOS) / WASAPI loopback (Win)</text>
  <rect x="700" y="72" width="260" height="84" rx="8" ry="8" fill="#0a0c12" stroke="rgba(214, 207, 199, 0.22)" stroke-width="1"/>
  <text x="830" y="108" text-anchor="middle" font-family="Saira, system-ui, sans-serif" font-size="15" font-weight="600" fill="#d6cfc7">Headphones</text>
  <text x="830" y="132" text-anchor="middle" font-family="Saira, system-ui, sans-serif" font-size="11" fill="rgba(214, 207, 199, 0.65)">sounddevice OutputStream @ 24 kHz</text>
  <text x="24" y="226" font-family="Saira, system-ui, sans-serif" font-size="11" fill="rgba(214, 207, 199, 0.40)" letter-spacing="3" style="text-transform:uppercase">vibemix Client</text>
  <rect x="24" y="234" width="1152" height="128" rx="10" ry="10" fill="url(#lane-bg)" stroke="rgba(255, 255, 255, 0.065)" stroke-width="1"/>
  <rect x="60" y="244" width="280" height="84" rx="8" ry="8" fill="#0a0c12" stroke="rgba(214, 207, 199, 0.22)" stroke-width="1"/>
  <text x="200" y="280" text-anchor="middle" font-family="Saira, system-ui, sans-serif" font-size="15" font-weight="600" fill="#d6cfc7">Python sidecar</text>
  <text x="200" y="304" text-anchor="middle" font-family="Saira, system-ui, sans-serif" font-size="11" fill="rgba(214, 207, 199, 0.65)">MusicState - EventDetector - AICoach</text>
  <rect x="380" y="244" width="280" height="84" rx="8" ry="8" fill="#0a0c12" stroke="rgba(214, 207, 199, 0.22)" stroke-width="1"/>
  <text x="520" y="280" text-anchor="middle" font-family="Saira, system-ui, sans-serif" font-size="15" font-weight="600" fill="#d6cfc7">Tauri UI</text>
  <text x="520" y="304" text-anchor="middle" font-family="Saira, system-ui, sans-serif" font-size="11" fill="rgba(214, 207, 199, 0.65)">wizard - session - settings - mascot</text>
  <rect x="700" y="244" width="280" height="84" rx="8" ry="8" fill="#0a0c12" stroke="rgba(214, 207, 199, 0.22)" stroke-width="1"/>
  <text x="840" y="280" text-anchor="middle" font-family="Saira, system-ui, sans-serif" font-size="15" font-weight="600" fill="#d6cfc7">Local recording</text>
  <text x="840" y="304" text-anchor="middle" font-family="Saira, system-ui, sans-serif" font-size="11" fill="rgba(214, 207, 199, 0.65)">input.wav - voice.wav - events.jsonl</text>
  <text x="24" y="398" font-family="Saira, system-ui, sans-serif" font-size="11" fill="rgba(214, 207, 199, 0.40)" letter-spacing="3" style="text-transform:uppercase">Network</text>
  <rect x="24" y="406" width="1152" height="128" rx="10" ry="10" fill="url(#lane-bg)" stroke="rgba(255, 255, 255, 0.065)" stroke-width="1"/>
  <rect x="300" y="416" width="600" height="84" rx="8" ry="8" fill="#0a0c12" stroke="rgba(214, 207, 199, 0.22)" stroke-width="1"/>
  <text x="600" y="452" text-anchor="middle" font-family="Saira, system-ui, sans-serif" font-size="15" font-weight="600" fill="#d6cfc7">Bravoh proxy</text>
  <text x="600" y="476" text-anchor="middle" font-family="Saira, system-ui, sans-serif" font-size="11" fill="rgba(214, 207, 199, 0.65)">api.altidus.world - JWT - 60 rpm / 2000 rpd</text>
  <text x="24" y="570" font-family="Saira, system-ui, sans-serif" font-size="11" fill="rgba(214, 207, 199, 0.40)" letter-spacing="3" style="text-transform:uppercase">Gemini</text>
  <rect x="24" y="578" width="1152" height="128" rx="10" ry="10" fill="url(#lane-bg)" stroke="rgba(255, 255, 255, 0.065)" stroke-width="1" filter="url(#glow)"/>
  <rect x="160" y="588" width="360" height="84" rx="8" ry="8" fill="#0a0c12" stroke="rgba(255, 138, 61, 0.40)" stroke-width="1"/>
  <text x="340" y="624" text-anchor="middle" font-family="Saira, system-ui, sans-serif" font-size="15" font-weight="600" fill="#d6cfc7">Gemini 3 Flash</text>
  <text x="340" y="648" text-anchor="middle" font-family="Saira, system-ui, sans-serif" font-size="11" fill="rgba(214, 207, 199, 0.65)">multimodal: audio + screen + evidence</text>
  <rect x="580" y="588" width="360" height="84" rx="8" ry="8" fill="#0a0c12" stroke="rgba(255, 138, 61, 0.40)" stroke-width="1"/>
  <text x="760" y="624" text-anchor="middle" font-family="Saira, system-ui, sans-serif" font-size="15" font-weight="600" fill="#d6cfc7">Gemini TTS</text>
  <text x="760" y="648" text-anchor="middle" font-family="Saira, system-ui, sans-serif" font-size="11" fill="rgba(214, 207, 199, 0.65)">streaming PCM chunks</text>
  <path d="M 200.0 156.0 C 200.0 200.0 200.0 200.0 200.0 244.0" fill="none" stroke="#ff8a3d" stroke-width="1.8" stroke-opacity="0.78" marker-end="url(#arrow-end)"/>
  <text x="200" y="200" text-anchor="middle" font-family="JetBrains Mono, ui-monospace, monospace" font-size="10" fill="#ffb88a" style="paint-order:stroke;stroke:#000000;stroke-width:3px">MIDI</text>
  <path d="M 510.0 156.0 C 510.0 200.0 200.0 200.0 200.0 244.0" fill="none" stroke="#ff8a3d" stroke-width="1.8" stroke-opacity="0.78" marker-end="url(#arrow-end)"/>
  <text x="355" y="200" text-anchor="middle" font-family="JetBrains Mono, ui-monospace, monospace" font-size="10" fill="#ffb88a" style="paint-order:stroke;stroke:#000000;stroke-width:3px">audio 48 kHz</text>
  <path d="M 760.0 588.0 C 760.0 372.0 830.0 372.0 830.0 156.0" fill="none" stroke="#ff8a3d" stroke-width="1.8" stroke-opacity="0.78" marker-end="url(#arrow-end)"/>
  <text x="795" y="372" text-anchor="middle" font-family="JetBrains Mono, ui-monospace, monospace" font-size="10" fill="#ffb88a" style="paint-order:stroke;stroke:#000000;stroke-width:3px">PCM 24 kHz</text>
  <path d="M 200.0 328.0 C 200.0 372.0 600.0 372.0 600.0 416.0" fill="none" stroke="#ff8a3d" stroke-width="1.8" stroke-opacity="0.78" marker-end="url(#arrow-end)"/>
  <text x="400" y="372" text-anchor="middle" font-family="JetBrains Mono, ui-monospace, monospace" font-size="10" fill="#ffb88a" style="paint-order:stroke;stroke:#000000;stroke-width:3px">HTTPS / JWT</text>
  <path d="M 600.0 500.0 C 600.0 544.0 340.0 544.0 340.0 588.0" fill="none" stroke="#ff8a3d" stroke-width="1.8" stroke-opacity="0.78" marker-end="url(#arrow-end)"/>
  <path d="M 340.0 588.0 C 340.0 630.0 760.0 630.0 760.0 672.0" fill="none" stroke="#ff8a3d" stroke-width="1.8" stroke-opacity="0.78" marker-end="url(#arrow-end)"/>
  <text x="600" y="704" text-anchor="middle" font-family="JetBrains Mono, ui-monospace, monospace" font-size="10" fill="rgba(214, 207, 199, 0.40)" letter-spacing="1">open source - Apache 2.0 - github.com/bravoh/vibemix</text>
</svg>
