[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "vibemix"
version = "0.1.0-dev0"
description = "Open-source AI DJ co-host. Listens, watches, talks back."
readme = "README.md"
requires-python = ">=3.12,<3.13"
license = { file = "LICENSE" }
authors = [
    { name = "Kaan Özkan", email = "oozzxaaii@gmail.com" },
]
keywords = ["dj", "ai", "audio", "midi", "live-performance", "gemini", "livekit"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Environment :: MacOS X",
    "Environment :: Win32 (MS Windows)",
    "Intended Audience :: End Users/Desktop",
    "License :: OSI Approved :: Apache Software License",
    "Operating System :: MacOS :: MacOS X",
    "Operating System :: Microsoft :: Windows",
    "Programming Language :: Python :: 3.12",
    "Topic :: Multimedia :: Sound/Audio",
    "Topic :: Artistic Software",
]
dependencies = [
    "google-genai>=2.0.1",
    "httpx>=0.28",
    "keyring>=25.7.0",
    "livekit-agents>=1.5.8",
    "livekit-plugins-google>=1.5.8",
    "livekit-plugins-openai>=1.5.8",
    "livekit>=1.1.7",
    "numpy>=2.4.4",
    "scipy>=1.17.1",
    "sounddevice>=0.5.5",
    "mido>=1.3.3",
    "python-rtmidi>=1.5.8",
    "mss>=10.2.0",
    "pillow>=12.2.0",
    "pyjwt>=2.12.1",
    "websockets>=13.0",
    "python-dotenv>=1.2.2",
    "pyobjc-core>=12.1 ; sys_platform == 'darwin'",
    "pyobjc-framework-Cocoa>=12.1 ; sys_platform == 'darwin'",
    "pyobjc-framework-Quartz>=12.1 ; sys_platform == 'darwin'",
]

[project.urls]
Homepage = "https://github.com/ozzaii/vibemix"
Repository = "https://github.com/ozzaii/vibemix"
Issues = "https://github.com/ozzaii/vibemix/issues"

[dependency-groups]
dev = [
    "ruff>=0.7",
    "pytest>=8.0",
    "pytest-mock>=3.15.1",
]

[tool.hatch.build.targets.wheel]
packages = ["src/vibemix"]

[tool.ruff]
target-version = "py312"
line-length = 100
src = ["src"]

[tool.ruff.lint]
select = ["E4", "E7", "E9", "F", "B", "I", "UP", "RUF"]
ignore = ["E501"]

[tool.ruff.lint.per-file-ignores]
"cohost*.py" = ["E", "F", "B", "I", "UP", "RUF"]
"_test_*.py" = ["E", "F", "B", "I", "UP", "RUF"]
"test_voice.py" = ["E", "F", "B", "I", "UP", "RUF"]
"generate_bat.py" = ["E", "F", "B", "I", "UP", "RUF"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
docstring-code-format = true

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra --strict-markers"
markers = [
    "macos_audio: requires BlackHole 2ch present (opt-in smoke test, Plan 05)",
]
